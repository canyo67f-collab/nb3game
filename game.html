<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>nb3game — Космическая Империя</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            padding: 16px;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.6s ease;
        }
        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loading-logo {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-sub {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        /* ===== AUTH SCREEN ===== */
        .auth-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9000;
            padding: 20px;
        }
        .auth-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
        }
        .auth-title {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-bottom: 24px;
        }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .auth-input:focus {
            border-color: #667eea;
        }
        .auth-input::placeholder {
            color: rgba(255,255,255,0.35);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
            margin-bottom: 10px;
        }
        .auth-btn:active { transform: scale(0.97); }
        .auth-btn.secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .auth-error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
            min-height: 18px;
        }
        .auth-switch {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }
        .auth-switch a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }
        .auth-user-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px 14px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .auth-user-bar span { color: rgba(255,255,255,0.6); }
        .auth-user-bar strong { color: #667eea; }
        .logout-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        /* ===== GAME UI ===== */
        .container { max-width: 480px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 {
            font-size: 2em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .clicker-area { text-align: center; margin-bottom: 30px; }
        .click-button {
            width: 200px; height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 4px solid rgba(255,255,255,0.3);
            font-size: 64px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 10px 40px rgba(102,126,234,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            position: relative;
            overflow: hidden;
        }
        .click-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 20px rgba(102,126,234,0.6);
        }
        .click-text {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            text-align: center;
        }

        .float-number {
            position: fixed;
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }

        .section {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upgrade-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .upgrade-info { flex: 1; }
        .upgrade-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .upgrade-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
        }
        .upgrade-stats {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
        }

        .buy-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            white-space: nowrap;
        }
        .buy-button:active { transform: scale(0.95); }
        .buy-button:disabled { opacity: 0.3; cursor: not-allowed; }

        .count-badge {
            background: rgba(102,126,234,0.3);
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }

        .achievement-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .achievement-item.locked {
            opacity: 0.5;
            border-color: rgba(255,255,255,0.1);
        }
        .achievement-icon {
            font-size: 32px;
            filter: grayscale(100%);
        }
        .achievement-item:not(.locked) .achievement-icon {
            filter: grayscale(0%);
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .achievement-text { flex: 1; }
        .achievement-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .achievement-desc { font-size: 11px; color: rgba(255,255,255,0.6); }

        .leaderboard-item {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .leader-rank { font-size: 18px; font-weight: 700; min-width: 35px; }
        .leader-name { flex: 1; margin-left: 12px; font-size: 14px; }
        .leader-coins { font-weight: 700; color: #ffd700; }

        .save-indicator {
            position: fixed;
            top: 20px; right: 20px;
            background: rgba(102,126,234,0.9);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .save-indicator.show { opacity: 1; }

        .tab-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            min-width: 70px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px 6px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ===== PRESTIGE ===== */
        .prestige-section {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.1));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .prestige-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffd700;
        }
        .prestige-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .prestige-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .prestige-btn:active { transform: scale(0.95); }
        .prestige-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .prestige-upgrade-item {
            background: rgba(255,215,0,0.06);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .prestige-upgrade-info { flex: 1; }
        .prestige-upgrade-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .prestige-upgrade-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 4px;
        }
        .prestige-upgrade-cost {
            font-size: 12px;
            color: #ffaa00;
            font-weight: 600;
        }
        .prestige-buy-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            color: #000;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.1s;
            white-space: nowrap;
        }
        .prestige-buy-btn:active { transform: scale(0.95); }
        .prestige-buy-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ===== TELEGRAM BUTTON ===== */
        #tgBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #0088cc, #0077b5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,136,204,0.4);
            z-index: 900;
            transition: transform 0.2s;
            text-decoration: none;
        }
        #tgBtn:hover { transform: scale(1.1); }
        #tgBtn:active { transform: scale(0.95); }
        #tgBtn svg {
            width: 26px;
            height: 26px;
            fill: #fff;
        }

        /* ===== QUANTITY BUTTONS ===== */
        .qty-selector {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            justify-content: center;
        }
        .qty-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .qty-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }
    </style>
</head>
<body>
    <!-- ===== LOADING SCREEN ===== -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">nb3game</div>
        <div class="loading-spinner"></div>
        <div class="loading-sub">Загрузка вселенной...</div>
    </div>

    <!-- ===== AUTH SCREEN ===== -->
    <div class="auth-screen" id="authScreen" style="display:none">
        <div class="auth-box">
            <div class="auth-title" id="authTitle">Вход</div>
            <div class="auth-subtitle">Космическая Империя</div>
            <div class="auth-error" id="authError"></div>
            <input class="auth-input" id="authEmail" type="email" placeholder="Email">
            <input class="auth-input" id="authPassword" type="password" placeholder="Пароль">
            <input class="auth-input" id="authName" type="text" placeholder="Имя игрока" style="display:none">
            <button class="auth-btn" id="authSubmitBtn" onclick="authSubmit()">Войти</button>
            <button class="auth-btn secondary" onclick="authGuest()">Играть без аккаунта</button>
            <div class="auth-switch" id="authSwitch">
                Нет аккаунта? <a onclick="toggleAuthMode()">Регистрация</a>
            </div>
        </div>
    </div>

    <!-- ===== GAME ===== -->
    <div id="gameContainer" style="display:none">
        <div class="save-indicator" id="saveIndicator">Сохранено</div>
        <div class="container">
            <!-- User bar -->
            <div class="auth-user-bar" id="userBar" style="display:none">
                <span>Игрок: <strong id="userDisplayName">—</strong></span>
                <button class="logout-btn" onclick="doLogout()">Выйти</button>
            </div>

            <div class="header">
                <h1>Космическая Империя</h1>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Монеты</div>
                    <div class="stat-value" id="coins">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">В секунду</div>
                    <div class="stat-value" id="perSecond">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">За клик</div>
                    <div class="stat-value" id="perClick">1</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Престиж</div>
                    <div class="stat-value" id="prestigePoints">0</div>
                </div>
            </div>

            <div class="clicker-area">
                <button class="click-button" id="clickButton">&#127980;</button>
                <div class="click-text">Кликай на планету!</div>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('upgrades', this)">Улучшения</button>
                <button class="tab-btn" onclick="switchTab('prestige', this)">Престиж</button>
                <button class="tab-btn" onclick="switchTab('achievements', this)">Достижения</button>
                <button class="tab-btn" onclick="switchTab('leaderboard', this)">Лидеры</button>
            </div>

            <!-- UPGRADES TAB -->
            <div id="upgradesTab" class="tab-content active">
                <div class="qty-selector">
                    <button class="qty-btn active" onclick="setBuyQty(1, this)">x1</button>
                    <button class="qty-btn" onclick="setBuyQty(5, this)">x5</button>
                    <button class="qty-btn" onclick="setBuyQty(10, this)">x10</button>
                    <button class="qty-btn" onclick="setBuyQty(100, this)">x100</button>
                </div>
                <div class="section">
                    <div class="section-title">Генераторы дохода</div>
                    <div id="generators"></div>
                </div>
                <div class="section">
                    <div class="section-title">Улучшения клика</div>
                    <div id="clickUpgrades"></div>
                </div>
            </div>

            <!-- PRESTIGE TAB -->
            <div id="prestigeTab" class="tab-content">
                <div id="prestigeSection"></div>
                <div class="section">
                    <div class="section-title" style="color:#ffd700;">Магазин престижа</div>
                    <div id="prestigeShop"></div>
                </div>
            </div>

            <!-- ACHIEVEMENTS TAB -->
            <div id="achievementsTab" class="tab-content">
                <div class="section">
                    <div class="section-title">Достижения</div>
                    <div id="achievements"></div>
                </div>
            </div>

            <!-- LEADERBOARD TAB -->
            <div id="leaderboardTab" class="tab-content">
                <div class="section">
                    <div class="section-title">Топ игроков</div>
                    <div id="leaderboardList">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== TELEGRAM BUTTON ===== -->
    <a id="tgBtn" href="https://t.me/neubiva3mostb_product" target="_blank">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.023 9.531c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.088 14.56l-2.948-.924c-.64-.203-.654-.64.136-.948l11.526-4.445c.534-.194 1.001.13.76.005z"/>
        </svg>
    </a>

    <script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCPl7h_9kTPqMCmn6XKGZWGJ0JU6lJVCeQ",
        authDomain: "nb3game-space.firebaseapp.com",
        projectId: "nb3game-space",
        storageBucket: "nb3game-space.firebasestorage.app",
        messagingSenderId: "000000000000",
        appId: "1:000000000000:web:0000000000000000000000"
    };

    let firebaseReady = false;
    let auth, db;
    try {
        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
        firebaseReady = true;
    } catch (e) {
        console.warn('Firebase init failed, running offline:', e);
    }

    // ==================== GAME STATE ====================
    let game = {
        coins: 0,
        totalCoins: 0,
        totalClicks: 0,
        clickPower: 1,
        coinsPerSecond: 0,
        prestigePoints: 0,
        prestigeSpent: 0,
        prestigeUpgrades: {},
        generators: [],
        clickUpgrades: [],
        achievements: [],
        playerName: ''
    };

    let buyQty = 1;
    let currentUser = null;
    let isRegistering = false;
    let autoClickInterval = null;

    // ==================== CONSTANTS ====================

    // ==================== AUTH ====================
    function toggleAuthMode() {
        isRegistering = !isRegistering;
        document.getElementById('authTitle').textContent = isRegistering ? 'Регистрация' : 'Вход';
        document.getElementById('authSubmitBtn').textContent = isRegistering ? 'Зарегистрироваться' : 'Войти';
        document.getElementById('authName').style.display = isRegistering ? 'block' : 'none';
        document.getElementById('authSwitch').innerHTML = isRegistering
            ? 'Уже есть аккаунт? <a onclick="toggleAuthMode()">Войти</a>'
            : 'Нет аккаунта? <a onclick="toggleAuthMode()">Регистрация</a>';
        document.getElementById('authError').textContent = '';
    }

    async function authSubmit() {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        const errEl = document.getElementById('authError');
        errEl.textContent = '';

        if (!email || !password) { errEl.textContent = 'Заполните все поля'; return; }
        if (password.length < 6) { errEl.textContent = 'Пароль минимум 6 символов'; return; }

        if (!firebaseReady) {
            errEl.textContent = 'Firebase не настроен. Играйте как гость.';
            return;
        }

        try {
            if (isRegistering) {
                const name = document.getElementById('authName').value.trim() || 'Игрок';
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: name });
                currentUser = cred.user;
                game.playerName = name;
            } else {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                currentUser = cred.user;
                game.playerName = cred.user.displayName || 'Игрок';
            }
            startGame();
        } catch (e) {
            const msgs = {
                'auth/email-already-in-use': 'Этот email уже используется',
                'auth/invalid-email': 'Неверный формат email',
                'auth/user-not-found': 'Пользователь не найден',
                'auth/wrong-password': 'Неверный пароль',
                'auth/invalid-credential': 'Неверный email или пароль'
            };
            errEl.textContent = msgs[e.code] || e.message;
        }
    }

    function authGuest() {
        currentUser = null;
        game.playerName = 'Гость';
        startGame();
    }

    function doLogout() {
        if (firebaseReady && auth.currentUser) auth.signOut();
        currentUser = null;
        document.getElementById('gameContainer').style.display = 'none';
        document.getElementById('authScreen').style.display = 'flex';
    }

    // ==================== GAME INIT ====================
    function startGame() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'block';

        if (currentUser) {
            document.getElementById('userBar').style.display = 'flex';
            document.getElementById('userDisplayName').textContent = game.playerName;
        } else {
            document.getElementById('userBar').style.display = 'flex';
            document.getElementById('userDisplayName').textContent = game.playerName;
        }

        initGame();
    }

    function initGame() {
        game.generators = [];
        game.clickUpgrades = [];
        game.achievements = [];

        generatorTypes.forEach(type => {
            game.generators.push({ ...type, count: 0, currentPrice: type.basePrice });
        });
        clickUpgradeTypes.forEach(type => {
            game.clickUpgrades.push({ ...type, count: 0, currentPrice: type.basePrice });
        });
        achievementsList.forEach(ach => {
            game.achievements.push({ ...ach, unlocked: false });
        });

        if (!game.prestigeUpgrades || typeof game.prestigeUpgrades !== 'object') {
            game.prestigeUpgrades = {};
        }

        loadGame();
        renderAll();
        startGameLoop();
        setupAutoClick();
    }

    // ==================== GAME LOGIC ====================
    function click() {
        let clickValue = getClickValue();

        // Critical hit check
        const critLevel = game.prestigeUpgrades['p_crit'] || 0;
        const critChance = critLevel * 0.10;
        let isCrit = false;
        if (critChance > 0 && Math.random() < critChance) {
            clickValue *= 5;
            isCrit = true;
        }

        game.coins += clickValue;
        game.totalCoins += clickValue;
        game.totalClicks++;

        const button = document.getElementById('clickButton');
        const rect = button.getBoundingClientRect();
        const floatNum = document.createElement('div');
        floatNum.className = 'float-number';
        floatNum.textContent = (isCrit ? 'КРИТ! +' : '+') + formatNumber(clickValue);
        if (isCrit) floatNum.style.color = '#ff4444';
        floatNum.style.left = (rect.left + rect.width / 2 - 30) + 'px';
        floatNum.style.top = (rect.top + rect.height / 2) + 'px';
        document.body.appendChild(floatNum);
        setTimeout(() => floatNum.remove(), 1000);

        updateDisplay();
        checkAchievements();
    }

    function getClickValue() {
        const clickMultLevel = game.prestigeUpgrades['p_click'] || 0;
        const clickMult = Math.pow(2, clickMultLevel);
        return game.clickPower * clickMult;
    }

    function getCPSMultiplier() {
        const cpsLevel = game.prestigeUpgrades['p_cps'] || 0;
        return Math.pow(2, cpsLevel);
    }

    function getPriceDiscount() {
        const cheapLevel = game.prestigeUpgrades['p_cheap'] || 0;
        return Math.max(0.2, 1 - cheapLevel * 0.15);
    }

    function getAutoClickRate() {
        return game.prestigeUpgrades['p_auto'] || 0;
    }

    function getStartCoins() {
        const startLevel = game.prestigeUpgrades['p_start'] || 0;
        return startLevel * 500;
    }

    function getPrestigeCost(type, level) {
        return Math.ceil(type.baseCost * Math.pow(type.costMult, level));
    }

    function calcGenPrice(gen, qty) {
        const discount = getPriceDiscount();
        let total = 0;
        let price = gen.currentPrice;
        for (let i = 0; i < qty; i++) {
            total += Math.floor(price * discount);
            price = Math.floor(gen.basePrice * Math.pow(gen.priceMultiplier, gen.count + i + 1));
        }
        return total;
    }

    function buyGenerator(index) {
        const gen = game.generators[index];
        const discount = getPriceDiscount();
        let bought = 0;

        for (let i = 0; i < buyQty; i++) {
            const cost = Math.floor(gen.currentPrice * discount);
            if (game.coins >= cost) {
                game.coins -= cost;
                gen.count++;
                gen.currentPrice = Math.floor(gen.basePrice * Math.pow(gen.priceMultiplier, gen.count));
                bought++;
            } else {
                break;
            }
        }

        if (bought > 0) {
            calculateCPS();
            updateDisplay();
            renderGenerators();
            checkAchievements();
            saveGame();
        }
    }

    function buyClickUpgrade(index) {
        const upg = game.clickUpgrades[index];

        let bought = 0;
        for (let i = 0; i < buyQty; i++) {
            if (game.coins >= upg.currentPrice) {
                game.coins -= upg.currentPrice;
                upg.count++;
                game.clickPower += upg.power;
                upg.currentPrice = Math.floor(upg.basePrice * Math.pow(upg.priceMultiplier, upg.count));
                bought++;
            } else {
                break;
            }
        }

        if (bought > 0) {
            updateDisplay();
            renderClickUpgrades();
            saveGame();
        }
    }

    function buyPrestigeUpgrade(id) {
        const typeIndex = prestigeUpgradeTypes.findIndex(t => t.id === id);
        if (typeIndex === -1) return;
        const type = prestigeUpgradeTypes[typeIndex];
        const currentLevel = game.prestigeUpgrades[id] || 0;
        const cost = getPrestigeCost(type, currentLevel);

        if (game.prestigePoints >= cost) {
            game.prestigePoints -= cost;
            game.prestigeSpent += cost;
            game.prestigeUpgrades[id] = currentLevel + 1;
            calculateCPS();
            setupAutoClick();
            renderPrestigeShop();
            renderPrestige();
            updateDisplay();
            saveGame();
        }
    }

    function calculateCPS() {
        const cpsMult = getCPSMultiplier();
        game.coinsPerSecond = game.generators.reduce((sum, gen) => {
            return sum + (gen.count * gen.baseCPS * cpsMult);
        }, 0);
    }

    function getPrestigeGain() {
        return Math.floor(Math.sqrt(game.totalCoins / 500000));
    }

    function doPrestige() {
        const gain = getPrestigeGain();
        if (gain <= 0) return;

        game.prestigePoints += gain;
        game.coins = getStartCoins();
        game.totalCoins = 0;
        game.totalClicks = 0;
        game.clickPower = 1;
        game.coinsPerSecond = 0;

        game.generators.forEach((gen, i) => {
            gen.count = 0;
            gen.currentPrice = generatorTypes[i].basePrice;
        });

        game.clickUpgrades.forEach((upg, i) => {
            upg.count = 0;
            upg.currentPrice = clickUpgradeTypes[i].basePrice;
        });

        calculateCPS();
        renderAll();
        updateDisplay();
        saveGame();
    }

    function checkAchievements() {
        let any = false;
        game.achievements.forEach(ach => {
            if (!ach.unlocked && typeof ach.check === 'function' && ach.check()) {
                ach.unlocked = true;
                any = true;
            }
        });
        if (any) {
            renderAchievements();
            saveGame();
        }
    }

    function setupAutoClick() {
        if (autoClickInterval) clearInterval(autoClickInterval);
        const rate = getAutoClickRate();
        if (rate > 0) {
            autoClickInterval = setInterval(() => {
                for (let i = 0; i < rate; i++) click();
            }, 1000);
        }
    }

    function setBuyQty(qty, btn) {
        buyQty = qty;
        document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGenerators();
        renderClickUpgrades();
    }

    // ==================== GAME LOOP ====================
    function startGameLoop() {
        setInterval(() => {
            const earned = game.coinsPerSecond / 10;
            game.coins += earned;
            game.totalCoins += earned;
            updateDisplay();
        }, 100);

        setInterval(() => {
            saveGame();
            checkAchievements();
            renderPrestige();
        }, 5000);
    }

    // ==================== RENDERING ====================
    function renderAll() {
        renderGenerators();
        renderClickUpgrades();
        renderAchievements();
        renderPrestige();
        renderPrestigeShop();
        updateDisplay();
    }

    function renderPrestige() {
        const section = document.getElementById('prestigeSection');
        const gain = getPrestigeGain();
        const totalPrestige = game.prestigePoints + game.prestigeSpent;

        let boostHTML = '';
        const clickMult = Math.pow(2, game.prestigeUpgrades['p_click'] || 0);
        const cpsMult = getCPSMultiplier();
        const discount = Math.round((1 - getPriceDiscount()) * 100);
        const autoRate = getAutoClickRate();
        const startCoins = getStartCoins();
        const critChance = (game.prestigeUpgrades['p_crit'] || 0) * 10;

        if (totalPrestige > 0 || game.coins >= 500000) {
            boostHTML = '<div style="text-align:left; font-size:12px; color:rgba(255,255,255,0.7); margin-bottom:12px;">';
            if (clickMult > 1) boostHTML += 'Клик: x' + clickMult + '<br>';
            if (cpsMult > 1) boostHTML += 'Доход: x' + cpsMult + '<br>';
            if (discount > 0) boostHTML += 'Скидка: -' + discount + '%<br>';
            if (autoRate > 0) boostHTML += 'Авто-клик: ' + autoRate + '/сек<br>';
            if (startCoins > 0) boostHTML += 'Старт: +' + formatNumber(startCoins) + ' монет<br>';
            if (critChance > 0) boostHTML += 'Крит: ' + critChance + '% шанс x5<br>';
            boostHTML += '</div>';
        }

        if (game.coins >= 500000 || totalPrestige > 0) {
            section.innerHTML = `
                <div class="prestige-section">
                    <div class="prestige-title">Престиж</div>
                    <div class="prestige-desc">
                        Перезапусти империю и получи очки престижа!<br>
                        Очки можно потратить на мощные бусты.<br>
                        Доступно: <strong>${game.prestigePoints}</strong> | Получишь: <strong>+${gain}</strong>
                    </div>
                    ${boostHTML}
                    <button class="prestige-btn" onclick="doPrestige()" ${gain === 0 ? 'disabled' : ''}>
                        Престиж ${gain > 0 ? '(+' + gain + ')' : '(нужно 500K монет)'}
                    </button>
                </div>
            `;
        } else {
            section.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.4); padding:20px;">Накопи 500 000 монет для первого престижа</div>';
        }
    }

    function renderPrestigeShop() {
        const container = document.getElementById('prestigeShop');
        container.innerHTML = prestigeUpgradeTypes.map(type => {
            const level = game.prestigeUpgrades[type.id] || 0;
            const cost = getPrestigeCost(type, level);
            const canBuy = game.prestigePoints >= cost;
            let effectText = type.desc;

            if (type.id === 'p_click') effectText = 'Клик x' + Math.pow(2, level + 1) + ' (сейчас x' + Math.pow(2, level) + ')';
            else if (type.id === 'p_cps') effectText = 'Доход x' + Math.pow(2, level + 1) + ' (сейчас x' + Math.pow(2, level) + ')';
            else if (type.id === 'p_cheap') effectText = 'Скидка -' + ((level + 1) * 15) + '% (сейчас -' + (level * 15) + '%)';
            else if (type.id === 'p_auto') effectText = 'Авто-клик ' + (level + 1) + '/сек (сейчас ' + level + '/сек)';
            else if (type.id === 'p_start') effectText = 'Старт +' + formatNumber((level + 1) * 500) + ' (сейчас +' + formatNumber(level * 500) + ')';
            else if (type.id === 'p_crit') effectText = 'Крит ' + ((level + 1) * 10) + '% (сейчас ' + (level * 10) + '%)';

            return `
                <div class="prestige-upgrade-item">
                    <div class="prestige-upgrade-info">
                        <div class="prestige-upgrade-name">
                            ${type.icon} ${type.name}
                            ${level > 0 ? '<span class="count-badge" style="background:rgba(255,215,0,0.2); color:#ffd700;">Ур. ' + level + '</span>' : ''}
                        </div>
                        <div class="prestige-upgrade-desc">${effectText}</div>
                        <div class="prestige-upgrade-cost">Цена: ${cost} очков</div>
                    </div>
                    <button class="prestige-buy-btn" onclick="buyPrestigeUpgrade('${type.id}')" ${!canBuy ? 'disabled' : ''}>
                        Купить
                    </button>
                </div>
            `;
        }).join('');
    }

    function renderGenerators() {
        const container = document.getElementById('generators');
        const discount = getPriceDiscount();
        const cpsMult = getCPSMultiplier();

        container.innerHTML = game.generators.map((gen, index) => {
            const price = Math.floor(gen.currentPrice * discount);
            return `
                <div class="upgrade-item">
                    <div class="upgrade-info">
                        <div class="upgrade-name">
                            ${gen.icon} ${gen.name}
                            ${gen.count > 0 ? '<span class="count-badge">' + gen.count + '</span>' : ''}
                        </div>
                        <div class="upgrade-desc">${formatNumber(gen.baseCPS * cpsMult)} монет/сек каждый</div>
                        <div class="upgrade-stats">Цена: ${formatNumber(price)}</div>
                    </div>
                    <button class="buy-button" onclick="buyGenerator(${index})" ${game.coins < price ? 'disabled' : ''}>
                        Купить${buyQty > 1 ? ' x' + buyQty : ''}
                    </button>
                </div>
            `;
        }).join('');
    }

    function renderClickUpgrades() {
        const container = document.getElementById('clickUpgrades');
        container.innerHTML = game.clickUpgrades.map((upg, index) => `
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <div class="upgrade-name">
                        ${upg.icon} ${upg.name}
                        ${upg.count > 0 ? '<span class="count-badge">' + upg.count + '</span>' : ''}
                    </div>
                    <div class="upgrade-desc">+${upg.power} к силе клика</div>
                    <div class="upgrade-stats">Цена: ${formatNumber(upg.currentPrice)}</div>
                </div>
                <button class="buy-button" onclick="buyClickUpgrade(${index})" ${game.coins < upg.currentPrice ? 'disabled' : ''}>
                    Купить${buyQty > 1 ? ' x' + buyQty : ''}
                </button>
            </div>
        `).join('');
    }

    function renderAchievements() {
        const container = document.getElementById('achievements');
        container.innerHTML = game.achievements.map(ach => `
            <div class="achievement-item ${ach.unlocked ? '' : 'locked'}">
                <div class="achievement-icon">${ach.icon}</div>
                <div class="achievement-text">
                    <div class="achievement-name">${ach.name}</div>
                    <div class="achievement-desc">${ach.desc}</div>
                </div>
            </div>
        `).join('');
    }

    function updateDisplay() {
        document.getElementById('coins').textContent = formatNumber(Math.floor(game.coins));
        document.getElementById('perSecond').textContent = formatNumber(game.coinsPerSecond);
        document.getElementById('perClick').textContent = formatNumber(getClickValue());
        document.getElementById('prestigePoints').textContent = game.prestigePoints;

        // Refresh buy button states
        const discount = getPriceDiscount();
        game.generators.forEach((gen, i) => {
            const btn = document.querySelectorAll('#generators .buy-button')[i];
            if (btn) btn.disabled = game.coins < Math.floor(gen.currentPrice * discount);
        });
        game.clickUpgrades.forEach((upg, i) => {
            const btn = document.querySelectorAll('#clickUpgrades .buy-button')[i];
            if (btn) btn.disabled = game.coins < upg.currentPrice;
        });
    }

    // ==================== LEADERBOARD (Firebase) ====================
    async function loadLeaderboard() {
        const container = document.getElementById('leaderboardList');

        if (!firebaseReady) {
            container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.5); padding:20px;">Firebase не настроен</div>';
            return;
        }

        try {
            const snapshot = await db.collection('leaderboard')
                .orderBy('totalCoins', 'desc')
                .limit(20)
                .get();

            if (snapshot.empty) {
                container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.5); padding:20px;">Пока нет игроков</div>';
                return;
            }

            container.innerHTML = snapshot.docs.map((doc, index) => {
                const data = doc.data();
                const medal = index === 0 ? '&#129351;' : index === 1 ? '&#129352;' : index === 2 ? '&#129353;' : (index + 1);
                return `
                    <div class="leaderboard-item">
                        <div class="leader-rank">${medal}</div>
                        <div class="leader-name">${escapeHtml(data.name || 'Игрок')}</div>
                        <div class="leader-coins">${formatNumber(data.totalCoins || 0)}</div>
                    </div>
                `;
            }).join('');
        } catch (e) {
            console.error('Leaderboard error:', e);
            container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.5); padding:20px;">Ошибка загрузки</div>';
        }
    }

    async function updateLeaderboard() {
        if (!firebaseReady || !currentUser) return;
        try {
            await db.collection('leaderboard').doc(currentUser.uid).set({
                name: game.playerName,
                totalCoins: Math.floor(game.totalCoins + game.coins),
                prestigePoints: game.prestigePoints + game.prestigeSpent,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch (e) {
            console.error('Leaderboard update error:', e);
        }
    }

    // ==================== SAVE / LOAD ====================
    function getSaveKey() {
        return currentUser ? 'nb3game_' + currentUser.uid : 'nb3game_guest';
    }

    function saveGame() {
        try {
            const saveData = {
                coins: game.coins,
                totalCoins: game.totalCoins,
                totalClicks: game.totalClicks,
                clickPower: game.clickPower,
                prestigePoints: game.prestigePoints,
                prestigeSpent: game.prestigeSpent,
                prestigeUpgrades: game.prestigeUpgrades,
                playerName: game.playerName,
                generators: game.generators.map(g => ({ id: g.id, count: g.count, currentPrice: g.currentPrice })),
                clickUpgrades: game.clickUpgrades.map(u => ({ id: u.id, count: u.count, currentPrice: u.currentPrice })),
                achievements: game.achievements.map(a => ({ id: a.id, unlocked: a.unlocked }))
            };
            localStorage.setItem(getSaveKey(), JSON.stringify(saveData));

            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 1000);

            updateLeaderboard();
        } catch (e) {
            console.error('Save error:', e);
        }
    }

    function loadGame() {
        try {
            const raw = localStorage.getItem(getSaveKey());
            if (!raw) return;
            const saved = JSON.parse(raw);

            game.coins = saved.coins || 0;
            game.totalCoins = saved.totalCoins || 0;
            game.totalClicks = saved.totalClicks || 0;
            game.clickPower = saved.clickPower || 1;
            game.prestigePoints = saved.prestigePoints || 0;
            game.prestigeSpent = saved.prestigeSpent || 0;
            game.prestigeUpgrades = saved.prestigeUpgrades || {};
            if (saved.playerName) game.playerName = saved.playerName;

            if (saved.generators) {
                saved.generators.forEach(sg => {
                    const gen = game.generators.find(g => g.id === sg.id);
                    if (gen) {
                        gen.count = sg.count || 0;
                        gen.currentPrice = sg.currentPrice || gen.basePrice;
                    }
                });
            }

            if (saved.clickUpgrades) {
                saved.clickUpgrades.forEach(su => {
                    const upg = game.clickUpgrades.find(u => u.id === su.id);
                    if (upg) {
                        upg.count = su.count || 0;
                        upg.currentPrice = su.currentPrice || upg.basePrice;
                    }
                });
            }

            if (saved.achievements) {
                saved.achievements.forEach(sa => {
                    const ach = game.achievements.find(a => a.id === sa.id);
                    if (ach) ach.unlocked = sa.unlocked || false;
                });
            }

            calculateCPS();
            setupAutoClick();
        } catch (e) {
            console.error('Load error:', e);
        }
    }

    // ==================== UTILS ====================
    function formatNumber(num) {
        if (num < 0) return '0';
        if (num < 1000) return Math.floor(num).toString();
        if (num < 1000000) return (num / 1000).toFixed(1) + 'K';
        if (num < 1000000000) return (num / 1000000).toFixed(1) + 'M';
        if (num < 1000000000000) return (num / 1000000000).toFixed(1) + 'B';
        return (num / 1000000000000).toFixed(1) + 'T';
    }

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');

        const tabMap = {
            'upgrades': 'upgradesTab',
            'prestige': 'prestigeTab',
            'achievements': 'achievementsTab',
            'leaderboard': 'leaderboardTab'
        };
        document.getElementById(tabMap[tab]).classList.add('active');

        if (tab === 'leaderboard') loadLeaderboard();
        if (tab === 'prestige') { renderPrestige(); renderPrestigeShop(); }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ==================== BOOT ====================
    document.getElementById('clickButton').addEventListener('click', click);

    window.addEventListener('load', () => {
        setTimeout(() => {
            const loading = document.getElementById('loadingScreen');
            loading.classList.add('fade-out');
            setTimeout(() => {
                loading.style.display = 'none';
                document.getElementById('authScreen').style.display = 'flex';
            }, 600);
        }, 1500);
    });
    </script>
</body>
